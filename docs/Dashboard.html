// ============================================================
// RadialScore — big circular gauge with center value + breakdown
// ============================================================
const RadialScore = ({ value, prev, size = 160, stroke = 14 }) => {
  const r = (size - stroke) / 2;
  const c = 2 * Math.PI * r;
  const off = c * (1 - value / 100);
  const offPrev = prev != null ? c * (1 - prev / 100) : null;

  return (
    <svg className="radial-svg" width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size / 2} cy={size / 2} r={r} fill="none" stroke="var(--bg-2)" strokeWidth={stroke} />
      {offPrev != null && (
        <circle
          cx={size / 2} cy={size / 2} r={r}
          fill="none" stroke="var(--text-soft)" strokeWidth={2}
          strokeDasharray={c}
          strokeDashoffset={offPrev}
          transform={`rotate(-90 ${size / 2} ${size / 2})`}
          opacity="0.35"
        />
      )}
      <circle
        cx={size / 2} cy={size / 2} r={r}
        fill="none" stroke="url(#gradOrange)" strokeWidth={stroke}
        strokeDasharray={c}
        strokeDashoffset={off}
        strokeLinecap="round"
        transform={`rotate(-90 ${size / 2} ${size / 2})`}
        style={{ transition: 'stroke-dashoffset 900ms cubic-bezier(.22,1,.36,1)' }}
      />
      <defs>
        <linearGradient id="gradOrange" x1="0" y1="0" x2="1" y2="1">
          <stop offset="0%" stopColor="#f98f03" />
          <stop offset="100%" stopColor="#e95400" />
        </linearGradient>
      </defs>
      <text
        x={size / 2}
        y={size / 2 - 2}
        textAnchor="middle"
        fontSize="38"
        fontWeight="600"
        fill="var(--text)"
        style={{ letterSpacing: '-0.025em', fontVariantNumeric: 'tabular-nums' }}
      >
        {value}
        <tspan fontSize="16" fill="var(--text-3)" dx="2" dy="-12">%</tspan>
      </text>
      <text
        x={size / 2}
        y={size / 2 + 20}
        textAnchor="middle"
        fontSize="10.5"
        fill="var(--text-3)"
        style={{ letterSpacing: '0.08em', textTransform: 'uppercase', fontWeight: 600 }}
      >
        Score global
      </text>
    </svg>
  );
};

// ============================================================
// Smooth Line Chart (multi-series)
// ============================================================
const LineChart = ({ series, labels, height = 260, padding = { t: 20, r: 18, b: 28, l: 38 }, yMax = 100, yTicks = [0, 50, 100], formatY }) => {
  const [hover, setHover] = React.useState(null);
  const ref = React.useRef(null);
  const [w, setW] = React.useState(800);

  React.useEffect(() => {
    if (!ref.current) return;
    const ro = new ResizeObserver(es => setW(Math.max(300, es[0].contentRect.width)));
    ro.observe(ref.current);
    return () => ro.disconnect();
  }, []);

  const h = height;
  const innerW = w - padding.l - padding.r;
  const innerH = h - padding.t - padding.b;
  const n = labels.length;
  const stepX = n > 1 ? innerW / (n - 1) : 0;
  const yScale = (v) => padding.t + innerH - (v / yMax) * innerH;
  const xScale = (i) => padding.l + i * stepX;
  const fy = (v) => (formatY ? formatY(v) : `${v}%`);

  // Smooth path via cardinal-ish curves
  const smoothPath = (vals) => {
    const pts = vals.map((v, i) => [xScale(i), yScale(v)]);
    if (pts.length < 2) return '';
    let d = `M ${pts[0][0]} ${pts[0][1]}`;
    for (let i = 0; i < pts.length - 1; i++) {
      const [x1, y1] = pts[i];
      const [x2, y2] = pts[i + 1];
      const mx = (x1 + x2) / 2;
      d += ` C ${mx} ${y1}, ${mx} ${y2}, ${x2} ${y2}`;
    }
    return d;
  };
  const areaPath = (vals) => {
    const d = smoothPath(vals);
    return `${d} L ${xScale(n - 1)} ${yScale(0)} L ${xScale(0)} ${yScale(0)} Z`;
  };

  return (
    <div ref={ref} style={{ position: 'relative', width: '100%' }}>
      <svg width={w} height={h} style={{ display: 'block' }}>
        {/* y-grid */}
        {yTicks.map(t => (
          <g key={t}>
            <line x1={padding.l} x2={w - padding.r} y1={yScale(t)} y2={yScale(t)} stroke="var(--border)" strokeWidth={1} />
            <text x={padding.l - 8} y={yScale(t)} fill="var(--text-3)" fontSize="10" textAnchor="end" alignmentBaseline="middle">{fy(t)}</text>
          </g>
        ))}
        {/* x-labels */}
        {labels.map((lab, i) => (
          <text key={i} x={xScale(i)} y={h - padding.b + 18} fill="var(--text-3)" fontSize="10.5" textAnchor="middle">{lab}</text>
        ))}
        {/* series */}
        {series.map((s, si) => {
          const gid = `gradFill-${si}`;
          return (
            <g key={si}>
              {s.fill && (
                <>
                  <defs>
                    <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stopColor={s.color} stopOpacity="0.20" />
                      <stop offset="100%" stopColor={s.color} stopOpacity="0" />
                    </linearGradient>
                  </defs>
                  <path d={areaPath(s.values)} fill={`url(#${gid})`} />
                </>
              )}
              <path d={smoothPath(s.values)} fill="none" stroke={s.color}
                    strokeWidth={2} strokeLinecap="round" strokeLinejoin="round"
                    strokeDasharray={s.dashed ? '4 4' : undefined} />
              {s.values.map((v, i) => (
                <circle key={i} cx={xScale(i)} cy={yScale(v)} r={hover === i ? 4.5 : 3.5}
                        fill="white" stroke={s.color} strokeWidth={2} />
              ))}
            </g>
          );
        })}
        {/* hover capture */}
        {labels.map((_, i) => (
          <rect key={i} x={xScale(i) - stepX / 2} y={padding.t} width={stepX} height={innerH}
                fill="transparent"
                onMouseEnter={() => setHover(i)}
                onMouseLeave={() => setHover(null)} />
        ))}
        {hover != null && (
          <line x1={xScale(hover)} x2={xScale(hover)} y1={padding.t} y2={h - padding.b}
                stroke="var(--text-soft)" strokeDasharray="2 3" />
        )}
      </svg>
      {hover != null && (
        <div style={{
          position: 'absolute',
          left: Math.min(Math.max(padding.l, xScale(hover) - 70), w - 150 - padding.r),
          top: padding.t,
          background: 'var(--surface)',
          border: '1px solid var(--border)',
          borderRadius: 6,
          padding: '8px 10px',
          fontSize: 12,
          boxShadow: '0 6px 18px rgba(0,24,80,0.08)',
          pointerEvents: 'none',
          minWidth: 130,
        }}>
          <div style={{ fontWeight: 600, marginBottom: 4, color: 'var(--text)' }}>{labels[hover]}</div>
          {series.map((s, si) => (
            <div key={si} style={{ display: 'flex', justifyContent: 'space-between', gap: 12, color: 'var(--text-2)' }}>
              <span style={{ display: 'inline-flex', alignItems: 'center', gap: 6 }}>
                <span style={{ width: 8, height: 2, background: s.color, borderRadius: 1 }} />
                {s.name}
              </span>
              <span style={{ fontWeight: 600, color: 'var(--text)', fontVariantNumeric: 'tabular-nums' }}>
                {fy(s.values[hover])}
              </span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

// ============================================================
// Sparkline (inline mini line)
// ============================================================
const Sparkline = ({ data, w = 84, h = 28, color = 'var(--accent)', invertY = false }) => {
  if (!data || data.length === 0) return null;
  const min = Math.min(...data);
  const max = Math.max(...data);
  const range = max - min || 1;
  const stepX = w / (data.length - 1);
  const pts = data.map((v, i) => {
    const y = invertY
      ? 4 + ((v - min) / range) * (h - 8)
      : h - 4 - ((v - min) / range) * (h - 8);
    return [i * stepX, y];
  });
  const d = pts.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p[0].toFixed(1)} ${p[1].toFixed(1)}`).join(' ');
  const last = pts[pts.length - 1];
  return (
    <svg className="sparkline-cell" width={w} height={h} viewBox={`0 0 ${w} ${h}`} preserveAspectRatio="none">
      <path d={d} fill="none" stroke={color} strokeWidth={1.5} strokeLinecap="round" strokeLinejoin="round" />
      <circle cx={last[0]} cy={last[1]} r={2} fill={color} />
    </svg>
  );
};

// ============================================================
// Distribution histogram (rank tracking)
// ============================================================
const Distribution = ({ buckets }) => {
  const max = Math.max(...buckets.map(b => b.count));
  return (
    <div>
      <div className="dist">
        {buckets.map((b, i) => {
          const pct = (b.count / max) * 100;
          return (
            <div key={i} className={`dist-col ${b.key}`} title={`${b.bucket}: ${b.count} mots-clés`}>
              <div className={`dist-delta ${b.delta > 0 ? 'up' : b.delta < 0 ? 'down' : 'flat'}`}>
                {b.delta > 0 && <span style={{ color: 'var(--good)' }}>▲ {b.delta}</span>}
                {b.delta < 0 && <span style={{ color: 'var(--bad)' }}>▼ {Math.abs(b.delta)}</span>}
                {b.delta === 0 && <span style={{ color: 'var(--text-soft)' }}>—</span>}
              </div>
              <div className="dist-num">{b.count}</div>
              <div className="dist-bar" style={{ height: '100%' }}>
                <div className="fill" style={{ height: `${pct}%` }} />
              </div>
              <div className="dist-lab">{b.bucket}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
};

// ============================================================
// Scatter — Opportunity map (keyword research)
// ============================================================
const ScatterMap = ({ items, onSelect, selectedKw }) => {
  // x = KD, y = Volume (log-ish), color = intent, size = CPC
  const [hover, setHover] = React.useState(null);
  const ref = React.useRef(null);
  const [w, setW] = React.useState(600);

  React.useEffect(() => {
    if (!ref.current) return;
    const ro = new ResizeObserver(es => setW(Math.max(320, es[0].contentRect.width)));
    ro.observe(ref.current);
    return () => ro.disconnect();
  }, []);

  const padding = { t: 20, r: 24, b: 30, l: 40 };
  const h = 280;
  const innerW = w - padding.l - padding.r;
  const innerH = h - padding.t - padding.b;

  const xMax = 100;  // KD 0-100
  const volMax = Math.max(...items.map(i => i.vol)) * 1.1;
  const xScale = (kd) => padding.l + (kd / xMax) * innerW;
  // Log scale for volume so 100 and 4000 don't collapse
  const yScale = (v) => {
    const lv = Math.log10(Math.max(1, v));
    const lmax = Math.log10(volMax);
    return padding.t + innerH - (lv / lmax) * innerH;
  };

  const colorOf = (intent) => ({
    Commercial: 'var(--orange)',
    Informationnel: 'var(--accent)',
    Transactionnel: 'var(--good)',
  }[intent] || 'var(--text-soft)');

  // Parse CPC like "€8.40"
  const cpcNum = (c) => parseFloat(String(c).replace(/[^\d.]/g, '')) || 0;
  const maxCpc = Math.max(...items.map(i => cpcNum(i.cpc)));
  const sizeOf = (cpc) => 4 + (cpcNum(cpc) / maxCpc) * 9;

  const volTicks = [100, 500, 1000, 3000];

  return (
    <div ref={ref} style={{ position: 'relative', padding: '8px 22px 18px' }}>
      <svg width={w} height={h} style={{ overflow: 'visible' }}>
        {/* y-grid (volume) */}
        {volTicks.map(t => (
          <g key={t}>
            <line x1={padding.l} x2={w - padding.r} y1={yScale(t)} y2={yScale(t)} stroke="var(--border)" strokeDasharray="2 4" />
            <text x={padding.l - 8} y={yScale(t)} fontSize="10" fill="var(--text-3)" textAnchor="end" alignmentBaseline="middle">{t.toLocaleString('fr-FR').replace(',', ' ')}</text>
          </g>
        ))}
        {/* x-grid (KD) */}
        {[0, 30, 60, 100].map(kd => (
          <g key={kd}>
            <line x1={xScale(kd)} x2={xScale(kd)} y1={padding.t} y2={h - padding.b} stroke="var(--border)" strokeDasharray="2 4" />
            <text x={xScale(kd)} y={h - padding.b + 16} fontSize="10" fill="var(--text-3)" textAnchor="middle">KD {kd}</text>
          </g>
        ))}
        {/* "Sweet spot" — low KD, high volume */}
        <rect
          x={xScale(0)} y={yScale(volMax)}
          width={xScale(40) - xScale(0)}
          height={yScale(500) - yScale(volMax)}
          fill="var(--good)" opacity="0.06"
        />
        <text x={xScale(20)} y={yScale(2500)} fontSize="10" fill="var(--good)" textAnchor="middle" fontWeight="600" letterSpacing="0.1em">SWEET SPOT</text>

        {/* dots */}
        {items.map((it, i) => {
          const cx = xScale(it.kd);
          const cy = yScale(it.vol);
          const r = sizeOf(it.cpc);
          const isSel = it.kw === selectedKw;
          const color = colorOf(it.intent);
          return (
            <circle
              key={i}
              cx={cx} cy={cy} r={r}
              className="scatter-dot"
              fill={color}
              fillOpacity={isSel ? 0.95 : 0.55}
              stroke={color}
              strokeWidth={isSel ? 3 : 1.5}
              onMouseEnter={() => setHover({ ...it, x: cx, y: cy })}
              onMouseLeave={() => setHover(null)}
              onClick={() => onSelect && onSelect(it.kw)}
            />
          );
        })}
      </svg>
      <div className="scatter-axis x">Keyword difficulty →</div>
      <div className="scatter-axis y">Volume mensuel ↑</div>

      {hover && (
        <div className="scatter-tip" style={{ left: hover.x, top: hover.y - 4 }}>
          <div className="v">{hover.kw}</div>
          <div className="muted" style={{ fontSize: 10.5, marginTop: 2 }}>
            {hover.vol.toLocaleString('fr-FR').replace(',', ' ')} vol · KD {hover.kd} · {hover.cpc}
          </div>
        </div>
      )}
    </div>
  );
};

const RankPage = () => {
  const d = window.DATA.rank;

  const [filter, setFilter] = React.useState('');
  const [sortKey, setSortKey] = React.useState('vol');
  const [sortDir, setSortDir] = React.useState('desc');
  const [device, setDevice] = React.useState('Desktop');
  const [running, setRunning] = React.useState(false);

  const toggle = (i) => setSelected(prev => {
    const n = new Set(prev);
    n.has(i) ? n.delete(i) : n.add(i);
    return n;
  });
  const toggleAll = () => {
    if (selected.size === filtered.length) setSelected(new Set());
    else setSelected(new Set(filtered.map((_, i) => i)));
  };

  const filtered = React.useMemo(() => {
    let rows = d.keywords.filter(k => k.kw.toLowerCase().includes(filter.toLowerCase()));
    rows = [...rows].sort((a, b) => {
      const av = a[sortKey], bv = b[sortKey];
      if (av == null) return 1;
      if (bv == null) return -1;
      if (typeof av === 'string') return sortDir === 'asc' ? av.localeCompare(bv) : bv.localeCompare(av);
      return sortDir === 'asc' ? av - bv : bv - av;
    });
    return rows;
  }, [d.keywords, filter, sortKey, sortDir]);

  const setSort = (k) => {
    if (sortKey === k) setSortDir(sortDir === 'asc' ? 'desc' : 'asc');

  const launchCheck = () => {
    setRunning(true);
    setTimeout(() => setRunning(false), 2400);

      <span className="pos">
        <span className="n">{pos}</span>
        {delta === 0
          ? <span className="delta flat"><span className="a">—</span></span>

        <Kpi label="Non classés" icon="info" value={d.notRanked} denom={d.trackedTotal}

      </div>

      {/* Signature: Distribution + Movers */}
      <div className="grid-2-1" style={{ marginBottom: 14 }}>

          style={{ flex: '0 1 280px' }}

        <Segmented
          value={period}

          <button><Icon name="download" size={13} /> Exporter</button>
          <span className="vr" />
          <button onClick={() => setSelected(new Set())} style={{ color: 'rgba(255,255,255,0.6)' }}>✕</button>
        </div>
      )}
    </div>
  );
};

window.KeywordPage = KeywordPage;

/* global React, ReactDOM, Sidebar, Topbar, GeoPage, RankPage, KeywordPage,
   PageHead, TweaksPanel, TweakSection, TweakRadio, TweakColor, useTweaks */

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "density": "spacious",
  "accent": "#e95400",
  "sidebar": "expanded",
  "cards": "bordered"
}/*EDITMODE-END*/;

const ACCENT_OPTIONS = ['#e95400', '#002882', '#2a4cff', '#10a37f', '#7c3aed'];

const App = () => {
  const [page, setPage] = React.useState('geo');
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // Apply tweaks
  React.useEffect(() => {
    const root = document.documentElement;
    // Accent (used for active sidebar bar)
    root.style.setProperty('--orange', t.accent);
    const hex = t.accent.replace('#', '');
    const r = parseInt(hex.slice(0, 2), 16);
    const g = parseInt(hex.slice(2, 4), 16);
    const b = parseInt(hex.slice(4, 6), 16);
    root.style.setProperty('--accent-rgb', `${r},${g},${b}`);

    // Density
    if (t.density === 'compact') {
      root.style.setProperty('--row-pad-y', '8px');
      root.style.setProperty('--row-pad-x', '14px');
      root.style.setProperty('--kpi-pad-y', '18px');
      root.style.setProperty('--kpi-pad-x', '20px');
      root.style.setProperty('--card-pad', '18px');
    } else if (t.density === 'comfortable') {
      root.style.setProperty('--row-pad-y', '11px');
      root.style.setProperty('--row-pad-x', '15px');
      root.style.setProperty('--kpi-pad-y', '22px');
      root.style.setProperty('--kpi-pad-x', '22px');
      root.style.setProperty('--card-pad', '20px');
    } else {
      // spacious (default)
      root.style.setProperty('--row-pad-y', '14px');
      root.style.setProperty('--row-pad-x', '16px');
      root.style.setProperty('--kpi-pad-y', '26px');
      root.style.setProperty('--kpi-pad-x', '26px');
      root.style.setProperty('--card-pad', '24px');
    }

    // Cards style
    if (t.cards === 'flat') {
      root.style.setProperty('--border', 'transparent');
      root.style.setProperty('--border-strong', '#e5e5ea');
    } else {
      root.style.setProperty('--border', '#ececf0');
      root.style.setProperty('--border-strong', '#dcdde4');
    }
  }, [t.accent, t.density, t.cards]);

  const sidebarCollapsed = t.sidebar === 'collapsed';

  const pageDef = {
    geo:     { Comp: GeoPage,     crumbs: ['AI Visibility', 'GEO Dashboard'],     lastRun: '15 mai 2026 · 08h14' },
    rank:    { Comp: RankPage,    crumbs: ['Keywords', 'Rank Tracking'],          lastRun: '18 mai 2026 · 07h45' },
    keyword: { Comp: KeywordPage, crumbs: ['Keywords', 'Keyword Research'],       lastRun: null },
  };

  const Placeholder = () => (
    <div className="page">
      <PageHead
        title="Bientôt disponible"
        sub="Cette section n'est pas encore connectée à la maquette. Reviens sur GEO Dashboard, Rank Tracking ou Keyword Research."
        actions={<button className="btn" onClick={() => setPage('geo')}>← Retour GEO Dashboard</button>}
      />
      <div className="card" style={{ padding: 48, textAlign: 'center' }}>
        <p style={{ marginBottom: 12, fontSize: 14, color: 'var(--text-2)' }}>
          <strong style={{ color: 'var(--text)', fontWeight: 600 }}>{page}</strong> — module placeholder
        </p>
        <p style={{ fontSize: 13, color: 'var(--text-3)' }}>
          Cliquez sur l'une des trois sections principales pour explorer la maquette.
        </p>
      </div>
    </div>
  );

  const def = pageDef[page] || { Comp: Placeholder, crumbs: ['Workspace', page], lastRun: null };
  const { Comp, crumbs, lastRun } = def;

  return (
    <div className="app" data-sidebar={sidebarCollapsed ? 'collapsed' : 'expanded'}>
      <Sidebar page={page} setPage={setPage} />
      <main className="main">
        <Topbar
          crumbs={crumbs}
          sidebarCollapsed={sidebarCollapsed}
          toggleSidebar={() => setTweak('sidebar', sidebarCollapsed ? 'expanded' : 'collapsed')}
          lastRun={lastRun}
        />
        <Comp />
      </main>

      <TweaksPanel open={tweaksOpen} onOpenChange={setTweaksOpen}>
        <TweakSection title="Densité" subtitle="Espacement des tableaux & cards.">
          <TweakRadio
            value={t.density}
            onChange={(v) => setTweak('density', v)}
            options={[
              { value: 'compact',     label: 'Compact' },
              { value: 'comfortable', label: 'Équilibré' },
              { value: 'spacious',    label: 'Aéré' },
            ]}
          />
        </TweakSection>

        <TweakSection title="Couleur accent" subtitle="Couleur des éléments actifs (sidebar, US dans le horserace). Le gradient CTA orange WeFiiT reste indépendant si vous changez.">
          <TweakColor value={t.accent} onChange={(v) => setTweak('accent', v)} options={ACCENT_OPTIONS} />
        </TweakSection>

        <TweakSection title="Sidebar">
          <TweakRadio
            value={t.sidebar}
            onChange={(v) => setTweak('sidebar', v)}
            options={[
              { value: 'expanded',  label: 'Étendue' },
              { value: 'collapsed', label: 'Repliée' },
            ]}
          />
        </TweakSection>

        <TweakSection title="Style des cards">
          <TweakRadio
            value={t.cards}
            onChange={(v) => setTweak('cards', v)}
            options={[
              { value: 'bordered', label: 'Bordées' },
              { value: 'flat',     label: 'Flat' },
            ]}
          />
        </TweakSection>
      </TweaksPanel>
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

  </script>
</body>
</html>
